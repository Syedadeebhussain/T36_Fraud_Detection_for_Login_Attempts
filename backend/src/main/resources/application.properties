spring.application.name=intelligent-fraud-detection

# ============================================================
# H2 In-Memory Database (no PostgreSQL or Docker required)
# ============================================================
spring.datasource.url=jdbc:h2:mem:frauddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Web Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Redis (Embedded — starts automatically inside the app)
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6370

# ============================================================
# Mail (disabled for demo — configure when needed)
# ============================================================
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your-username
spring.mail.password=your-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Comment out auto-configuration if no SMTP server available:
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

